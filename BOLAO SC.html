<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Copa do Mundo Super Cordeiro</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            max-width: 800px; 
            margin: 20px auto; 
            padding: 20px; 
            background-color: #1a1a1a; 
            color: #ffffff;
        }
        .container { 
            background-color: #222222; 
            padding: 25px; 
            border-radius: 8px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
        }
        h2 { text-align: center; color: #f39c12; margin-top: 0; font-size: 24px; }
        .instrucoes { text-align: center; color: #aaaaaa; margin-bottom: 25px; font-size: 14px; }
        
        .campo-nome { margin-bottom: 25px; background: #2d2d2d; padding: 15px; border-radius: 6px; border-left: 4px solid #f39c12; }
        label.titulo-nome { display: block; font-weight: bold; margin-bottom: 8px; color: #ffffff; }
        input[type="text"] { 
            width: 100%; padding: 12px; box-sizing: border-box; background-color: #1a1a1a; 
            border: 1px solid #444; border-radius: 4px; color: white; font-size: 15px; 
        }
        input[type="text"]:focus { border-color: #f39c12; outline: none; }

        .header-tabela { 
            display: flex; justify-content: space-between; align-items: center;
            background-color: #111111; padding: 10px 15px; font-size: 13px; 
            font-weight: bold; color: #888888; border-bottom: 1px solid #333;
        }
        .header-times { flex: 2; text-align: left; }
        .header-opcoes { flex: 3; display: flex; justify-content: space-between; text-align: center; max-width: 400px; width: 100%; }
        .header-opcoes span { flex: 1; }

        .container-jogo { background-color: #222222; border-bottom: 1px solid #333; padding: 15px; }
        .linha-principal { display: flex; justify-content: space-between; align-items: center; }
        .info-jogo { flex: 2; text-align: left; }
        .nome-confronto { font-size: 16px; font-weight: bold; color: #ffffff; margin-bottom: 4px; }
        .data-jogo { font-size: 12px; color: #888888; }

        .opcoes-resultado { flex: 3; display: flex; gap: 10px; max-width: 400px; width: 100%; }
        .radio-box { 
            flex: 1; position: relative; background: #2d2d2d; border: 1px solid #444; 
            border-radius: 4px; padding: 12px 0; text-align: center; cursor: pointer; 
            font-weight: bold; color: #f1c40f; transition: background 0.2s;
        }
        .radio-box input { position: absolute; opacity: 0; cursor: pointer; }
        .radio-box:hover { background: #383838; }
        
        .radio-box:has(input:checked) { background-color: #f39c12; border-color: #f39c12; }
        .radio-box:has(input:checked) span { color: #1a1a1a !important; }

        .aba-placar { 
            background-color: #1c1c1c; margin-top: 12px; padding: 12px 15px; 
            border-radius: 4px; display: flex; align-items: center; gap: 15px;
        }
        .titulo-placar { font-size: 12px; font-weight: bold; color: #888888; text-transform: uppercase; min-width: 100px; }
        .placar-inputs { display: flex; align-items: center; gap: 8px; }
        .placar-inputs input { 
            width: 60px; padding: 6px; text-align: center; font-size: 16px; font-weight: bold; 
            background-color: #2d2d2d; border: 1px solid #444; border-radius: 4px; color: #fff; 
        }
        .placar-inputs input:focus { border-color: #f39c12; outline: none; }
        .divisor-placar { color: #888; font-weight: bold; }

        button.btn-enviar { 
            background-color: #27ae60; color: white; padding: 16px 20px; border: none; 
            border-radius: 4px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; 
            margin-top: 25px; transition: background 0.2s; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.2);
        }
        button.btn-enviar:hover { background-color: #219653; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏆 Bolão Copa do Mundo Super Cordeiro</h2>
        <p class="instrucoes">Digite seu nome, escolha os vencedores (1 X 2) e defina o placar exato de todas as 15 partidas.</p>
        
        <form id="formBolao" onsubmit="enviarPalpites(event)">
            
            <div class="campo-nome">
                <label class="titulo-nome" for="nome">Nome do Participante:</label>
                <input type="text" id="nome" required placeholder="Digite seu nome completo">
            </div>

            <div class="header-tabela">
                <div class="header-times">Confronto</div>
                <div class="header-opcoes">
                    <span>1 (Casa)</span>
                    <span>X (Empate)</span>
                    <span>2 (Fora)</span>
                </div>
            </div>

            <div id="lista-jogos">
                <script>
                    const listaJogos = [
                        "Brasil x Marrocos", "Brasil x Escócia", "Brasil x Haiti",
                        "Portugal x Congo", "Portugal x Colômbia", "Portugal x Uzbequistão",
                        "Argentina x Argélia", "Argentina x Jordânia", "Argentina x Áustria",
                        "Espanha x Cabo Verde", "Espanha x Uruguai", "Espanha x Arábia Saudita",
                        "França x Senegal", "França x Noruega", "França x Iraque"
                    ];
                    
                    listaJogos.forEach((jogo, i) => {
                        const num = i + 1;
                        document.write(`
                            <div class="container-jogo">
                                <div class="linha-principal">
                                    <div class="info-jogo">
                                        <div class="nome-confronto">${num}º Jogo: ${jogo}</div>
                                        <div class="data-jogo">Fase de Grupos</div>
                                    </div>
                                    <div class="opcoes-resultado">
                                        <label class="radio-box"><input type="radio" name="resultado_j${num}" value="Casa" required><span>1</span></label>
                                        <label class="radio-box"><input type="radio" name="resultado_j${num}" value="Empate"><span>X</span></label>
                                        <label class="radio-box"><input type="radio" name="resultado_j${num}" value="Fora"><span>2</span></label>
                                    </div>
                                </div>
                                <div class="aba-placar">
                                    <div class="titulo-placar">Placar Exato:</div>
                                    <div class="placar-inputs">
                                        <input type="number" name="gols_casa_j${num}" min="0" required placeholder="0">
                                        <span class="divisor-placar">x</span>
                                        <input type="number" name="gols_fora_j${num}" min="0" required placeholder="0">
                                    </div>
                                </div>
                            </div>
                        `);
                    });
                </script>
            </div>

            <button type="submit" class="btn-enviar">Enviar Palpites do Bolão 🚀</button>
        </form>
    </div>

    <script>
        function enviarPalpites(event) {
            event.preventDefault();
            
            // COLE O SEU NOVO LINK DO WEB APP ENTRE AS ASPAS ABAIXO:
            const URL_GOOGLE_SCRIPT = "https://script.google.com/macros/s/AKfycbyv2i6MlQDTOj5OB6Ljzfobw66VFLXdgHg4--VCJ0IkGwuZut8KgSK49Oei6N-NO6fY/exec";
            
            const nomeParticipante = document.getElementById('nome').value;
            const dadosPlanilha = [];

            for (let num = 1; num <= 15; num++) {
                const resultadoSelecionado = document.querySelector(`input[name="resultado_j${num}"]:checked`).value;
                const golsCasa = document.querySelector(`input[name="gols_casa_j${num}"]`).value;
                const golsFora = document.querySelector(`input[name="gols_fora_j${num}"]`).value;
                const nomeJogo = listaJogos[num - 1];

                dadosPlanilha.push({
                    "Nome": nomeParticipante,
                    "Jogo": nomeJogo,
                    "Resultado": resultadoSelecionado,
                    "GolsCasa": parseInt(golsCasa),
                    "GolsFora": parseInt(golsFora)
                });
            }

            const botao = document.querySelector('.btn-enviar');
            const textoOriginal = botao.innerHTML;
            botao.disabled = true;
            botao.innerHTML = "Enviando palpites... Aguarde ⏳";
            botao.style.backgroundColor = "#7f8c8d";

            fetch(URL_GOOGLE_SCRIPT, {
                method: "POST",
                mode: "no-cors",
                headers: { 
                    "Content-Type": "text/plain" 
                },
                body: JSON.stringify(dadosPlanilha)
            })
            .then(() => {
                alert("Sucesso, " + nomeParticipante + "!\nSeus palpites foram computados na planilha Palpites_Cordeiro!");
                document.getElementById('formBolao').reset();
            })
            .catch(erro => {
                alert("Erro ao enviar.");
                console.error(erro);
            })
            .finally(() => {
                botao.disabled = false;
                botao.innerHTML = textoOriginal;
                botao.style.backgroundColor = "#27ae60";
            });
        }
    </script>
</body>
</html>
